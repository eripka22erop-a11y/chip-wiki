<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивные калькуляторы | Chip-Wiki</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        .nav-back { display: inline-block; color: #38bdf8; text-decoration: none; margin-bottom: 20px; font-weight: bold; }
        .nav-back:hover { text-decoration: underline; }
        header { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        h1 { color: #38bdf8; font-size: 2rem; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 1.1rem; }

        .calc-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 25px; }
        h2 { color: #38bdf8; font-size: 1.3rem; margin-bottom: 15px; border-left: 4px solid #38bdf8; padding-left: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #f8fafc; font-size: 1rem; }
        input:focus { border-color: #38bdf8; outline: none; }

        .result-box { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #38bdf8; margin-top: 15px; text-align: center; }
        .result-val { font-size: 1.6rem; font-weight: bold; color: #22c55e; }
        .result-label { font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-back">← Назад к поиску</a>

        <header>
            <h1>🧮 Онлайн-калькуляторы</h1>
            <div class="subtitle">Быстрый расчёт делителей напряжения и таймера NE555</div>
        </header>

        <!-- Калькулятор 1: Делитель напряжения -->
        <div class="calc-card">
            <h2>Делитель напряжения</h2>
            <div class="form-group">
                <label>Входное напряжение (V<sub>in</sub>), В:</label>
                <input type="number" id="divVin" value="12" step="0.1" oninput="calcDivider()">
            </div>
            <div class="form-group">
                <label>Резистор R1 (Верхний), Ом:</label>
                <input type="number" id="divR1" value="10000" oninput="calcDivider()">
            </div>
            <div class="form-group">
                <label>Резистор R2 (Нижний к GND), Ом:</label>
                <input type="number" id="divR2" value="4700" oninput="calcDivider()">
            </div>

            <div class="result-box">
                <div class="result-label">Выходное напряжение (V<sub>out</sub>):</div>
                <div class="result-val" id="divRes">3.84 В</div>
            </div>
        </div>

        <!-- Калькулятор 2: NE555 -->
        <div class="calc-card">
            <h2>Расчёт частоты NE555 (Астабильный режим)</h2>
            <div class="form-group">
                <label>Резистор R1, Ом:</label>
                <input type="number" id="555R1" value="1000" oninput="calc555()">
            </div>
            <div class="form-group">
                <label>Резистор R2, Ом:</label>
                <input type="number" id="555R2" value="10000" oninput="calc555()">
            </div>
            <div class="form-group">
                <label>Конденсатор C1, мкФ (микрофарады):</label>
                <input type="number" id="555C" value="0.1" step="0.01" oninput="calc555()">
            </div>

            <div class="result-box">
                <div class="result-label">Частота генерации / Скважность:</div>
                <div class="result-val" id="555Res">685.7 Гц</div>
                <div style="color: #94a3b8; font-size: 0.9rem; margin-top: 4px;" id="555Duty">Скважность: 52.4%</div>
            </div>
        </div>

    </div>

    <script>
        function calcDivider() {
            let vin = parseFloat(document.getElementById('divVin').value) || 0;
            let r1 = parseFloat(document.getElementById('divR1').value) || 0;
            let r2 = parseFloat(document.getElementById('divR2').value) || 0;

            if (r1 + r2 === 0) {
                document.getElementById('divRes').innerText = '0 В';
                return;
            }

            let vout = vin * (r2 / (r1 + r2));
            document.getElementById('divRes').innerText = vout.toFixed(2) + ' В';
        }

        function calc555() {
            let r1 = parseFloat(document.getElementById('555R1').value) || 0;
            let r2 = parseFloat(document.getElementById('555R2').value) || 0;
            let c_uf = parseFloat(document.getElementById('555C').value) || 0;

            let c = c_uf * 0.000001; // переводим мкФ в Фарады

            if (r1 + 2 * r2 === 0 || c === 0) {
                document.getElementById('555Res').innerText = '0 Гц';
                return;
            }

            let freq = 1.44 / ((r1 + 2 * r2) * c);
            let duty = ((r1 + r2) / (r1 + 2 * r2)) * 100;

            if (freq >= 1000) {
                document.getElementById('555Res').innerText = (freq / 1000).toFixed(2) + ' кГц';
            } else {
                document.getElementById('555Res').innerText = freq.toFixed(1) + ' Гц';
            }

            document.getElementById('555Duty').innerText = 'Скважность: ' + duty.toFixed(1) + '%';
        }
    </script>

</body>
</html>
